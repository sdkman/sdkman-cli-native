name: Notify Chloé (Issue Triage)

on:
  issues:
    types: [opened]
  issue_comment:
    types: [created]

jobs:
  notify:
    runs-on: ubuntu-latest
    if: github.event.sender.type != 'Bot'
    steps:
      - name: Send to OpenClaw
        env:
          HOOK_URL: ${{ secrets.OPENCLAW_HOOK_URL }}
          EVENT_NAME: ${{ github.event_name }}
          REPO: ${{ github.repository }}
          SENDER: ${{ github.event.sender.login }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          COMMENT_URL: ${{ github.event.comment.html_url }}
        run: |
          WAKE_URL="${HOOK_URL/hooks\/agent/hooks\/wake}"
          if [ "$EVENT_NAME" = "issues" ]; then
            TEXT="New issue in ${REPO} — #${ISSUE_NUMBER}: ${ISSUE_TITLE}"
            TEXT+=$'\nAuthor: '"${SENDER}"
            TEXT+=$'\nURL: '"${ISSUE_URL}"
            TEXT+=$'\n\n'"${ISSUE_BODY}"
          else
            TEXT="New comment on ${REPO} — #${ISSUE_NUMBER}: ${ISSUE_TITLE}"
            TEXT+=$'\nFrom: '"${SENDER}"
            TEXT+=$'\nURL: '"${COMMENT_URL}"
            TEXT+=$'\n\n'"${COMMENT_BODY}"
          fi
          PAYLOAD=$(jq -n --arg text "$TEXT" '{"text": $text, "mode": "now"}')
          curl -sf -X POST \
            -H "Authorization: Bearer ${{ secrets.OPENCLAW_HOOK_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "$WAKE_URL"
