name: Promote to Stable

on:
  workflow_dispatch:

jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: master

      - name: Get Latest Beta Version
        id: get_version
        run: |
          latest_tag=$(git describe --tags --abbrev=0)
          version=${latest_tag#v}
          echo "VERSION=${version}" >> $GITHUB_ENV
          echo "Latest tag version: ${latest_tag}"

      - name: Promote to Stable
        env:
          MONGO_URL: ${{ secrets.MONGO_URL }}
          MONGO_USERNAME: ${{ secrets.MONGO_USERNAME }}
          MONGO_PASSWORD: ${{ secrets.MONGO_PASSWORD }}
          RELEASE_VERSION: ${{ env.VERSION }}
        run: bin/release-binary.sh "$MONGO_URL" "$MONGO_USERNAME" "$MONGO_PASSWORD" "$RELEASE_VERSION" "stable"

  notify-failure:
    name: "Notify on Failure"
    runs-on: ubuntu-latest
    needs: [promote]
    if: failure()
    steps:
      - name: Notify Chloé
        env:
          REPO: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          MSG="❌ Release build failed: ${REPO}"
          MSG+=$'\nRun: '"${RUN_URL}"
          PAYLOAD=$(jq -n --arg msg "$MSG" --arg name "GitHub CI" \
            '{message: $msg, name: $name, deliver: true, channel: "discord", to: "1474759623209783327"}')
          curl -sf -X POST \
            -H "Authorization: Bearer ${{ secrets.OPENCLAW_HOOK_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "${{ secrets.OPENCLAW_HOOK_URL }}"
